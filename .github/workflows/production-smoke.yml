name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Production app URL
        required: false
        default: https://tuesday-ops.vercel.app
  schedule:
    - cron: "17,47 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SMOKE_URL: ${{ github.event.inputs.app_url || 'https://tuesday-ops.vercel.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke suite
        run: npm run smoke:production
