name: Production Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_url:
        description: Production app URL
        required: false
        default: https://www.maintainflow.io
  schedule:
    - cron: "17,47 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SMOKE_URL: ${{ github.event.inputs.app_url || 'https://www.maintainflow.io' }}
      EXPECTED_PRODUCTION_RELEASE: ${{ github.event_name == 'push' && github.sha || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for pushed release to reach production
        if: github.event_name == 'push'
        run: node scripts/wait-for-production-release.mjs

      - name: Run production smoke suite
        run: npm run smoke:production
